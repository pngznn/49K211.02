<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CliniCare Chatbot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #f2f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding: 24px;
    }

    .chat-widget {
      width: 470px;
      background: #fff;
      border-radius: 28px 28px 0 0;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.14);
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }

    .chat-header {
      height: 58px;
      background: #f5f5f5;
      border-bottom: 1px solid #d9dce2;
      display: flex;
      align-items: center;
      padding: 0 16px;
    }

    .chat-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      color: #111827;
    }

    .chat-brand-icon {
      width: 34px;
      height: 34px;
      border-radius: 11px;
      background: #3559c7;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      line-height: 1;
    }

    .chat-body {
      padding: 12px 14px 0;
      background: #fff;
    }

    .chat-inner {
      border: 5px solid #2d86dc;
      border-bottom-width: 4px;
      border-radius: 22px;
      min-height: 430px;
      height: 430px;
      padding: 18px 16px 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .chat-messages {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-right: 2px;
      margin-bottom: 16px;
      height: 300px;
      max-height: 300px;
      overflow-y: auto;
    }

    .message {
      max-width: 82%;
      border-radius: 18px;
      padding: 16px 18px 14px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.bot {
      background: #d6d9df;
      color: #333;
      align-self: flex-start;
    }

    .message.user {
      background: #3754bf;
      color: white;
      align-self: flex-end;
    }

    .message-time {
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.7;
    }

    .chat-input-area {
      border-top: 1px solid #d9dde5;
      padding-top: 16px;
    }

    .chat-input-wrap {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 8px;
    }

    .chat-input {
      flex: 1;
      height: 34px;
      border: 1px solid #cfd5df;
      border-radius: 11px;
      padding: 0 12px;
      font-size: 14px;
      outline: none;
    }

    .chat-input::placeholder {
      color: #9aa1ac;
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 10px;
      background: #d1d5db;
      color: #111827;
      cursor: pointer;
      font-size: 18px;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: #c4c9d1;
    }

    .chat-note {
      font-size: 11px;
      color: #7c8391;
      text-align: center;
      margin-top: 10px;
      padding-bottom: 2px;
    }

    @media (max-width: 576px) {
      body {
        padding: 12px;
      }

      .chat-widget {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <section class="chat-widget">
    <div class="chat-header">
      <div class="chat-brand">
        <div class="chat-brand-icon">+</div>
        <span>CliniCare</span>
      </div>
    </div>

    <div class="chat-body">
      <div class="chat-inner">
        <div class="chat-messages" id="chatMessages">
          <div class="message bot">
            Xin chào, tôi là AI hỗ trợ y tế. Bạn đang gặp vấn đề gì?
          </div>
        </div>

        <div class="chat-input-area">
          <div class="chat-input-wrap">
            <input
              id="chatInput"
              class="chat-input"
              type="text"
              placeholder="Mô tả triệu chứng của bạn ..."
            />
            <button class="send-btn" onclick="sendMessage()">➤</button>
          </div>

          <div class="chat-note">
            ⚠ Đây là tư vấn sơ bộ. Vui lòng khám bác sĩ để chẩn đoán chính xác.
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="chatbot.js"></script>
</body>
</html>
